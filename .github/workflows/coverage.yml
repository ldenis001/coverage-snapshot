name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  # Needed so the action can post/update the coverage comment on PRs.
  pull-requests: write

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run tests with coverage
        # Always run so the report is generated even if some tests fail.
        run: npm run coverage

      - name: Report coverage
        # Posts a coverage table to the job summary, and on pull requests
        # adds/updates a sticky PR comment. No third-party service required.
        uses: davelosert/vitest-coverage-report-action@v2
        if: always()
